<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海龟策略多场景对比 — TASK4</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:#f5f7fa; color:#333; padding:20px; }
h1 { font-size:18px; color:#1a237e; margin-bottom:4px; }
.sub { font-size:12px; color:#999; margin-bottom:16px; }
.heatmap { display:flex; gap:12px; margin-bottom:20px; }
.col-labels { display:flex; flex-direction:column; gap:8px; padding-top:36px; min-width:100px; }
.col-labels div { font-size:10px; color:#666; text-align:right; padding:3px 6px; }
.grid { flex:1; }
.row { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
.row-label { font-size:11px; font-weight:600; min-width:70px; text-align:right; }
.cell { flex:1; padding:8px 4px; border-radius:6px; text-align:center; cursor:pointer; transition:transform .15s; }
.cell:hover { transform:scale(1.05); z-index:2; }
.cell .val { font-size:18px; font-weight:700; }
.cell .det { font-size:9px; opacity:.8; }
.header-row { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
.header-row .spacer { min-width:70px; }
.header-row .hdr { flex:1; text-align:center; font-size:10px; color:#666; font-weight:600; }
.legend { font-size:11px; color:#999; text-align:center; margin:12px 0; }
.metrics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.metric-section { background:#fff; border-radius:8px; padding:12px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.metric-section h3 { font-size:13px; color:#1a237e; margin-bottom:8px; }
.bar { display:flex; align-items:center; margin:4px 0; font-size:11px; }
.bar .label { min-width:80px; text-align:right; margin-right:8px; color:#666; }
.bar .bar-bg { flex:1; background:#e8eaf6; border-radius:3px; height:18px; position:relative; }
.bar .bar-fill { height:100%; border-radius:3px; position:absolute; left:0; top:0; }
.bar .bar-val { margin-left:8px; min-width:50px; font-weight:600; font-size:10px; }
.pos { background:linear-gradient(90deg,#c62828,#ef5350) !important; }
.neg { background:linear-gradient(90deg,#b71c1c,#c62828) !important; }
</style>
</head>
<body>
<h1>🐢 海龟交易策略 — 多场景对比实验</h1>
<p class="sub">TASK4 · 王艳鹏 · 6只股票 × 3种参数 = 18组实验</p>

<div class="heatmap" id="heatmap"></div>
<div class="legend">🔴 红色越深=收益越高 | 白色≈0 | 累计回报率(%)</div>

<div class="metrics-grid" id="details"></div>

<script>
const DATA = [
  {"stock":"002594.SZ 比亚迪(A)","strategy":"短周期 (10,10)","return":155.8,"sharpe":0.63,"mdd":-20.9,"win_rate":40.0,"trades":40},
  {"stock":"002594.SZ 比亚迪(A)","strategy":"系统一 (20,10)","return":114.1,"sharpe":0.53,"mdd":-19.1,"win_rate":48.0,"trades":25},
  {"stock":"002594.SZ 比亚迪(A)","strategy":"系统二 (55,20)","return":196.0,"sharpe":0.71,"mdd":-22.9,"win_rate":42.9,"trades":14},
  {"stock":"600900.SH 长江电力(A)","strategy":"短周期 (10,10)","return":-0.4,"sharpe":-0.16,"mdd":-22.0,"win_rate":29.3,"trades":41},
  {"stock":"600900.SH 长江电力(A)","strategy":"系统一 (20,10)","return":-16.5,"sharpe":-0.47,"mdd":-24.5,"win_rate":33.3,"trades":33},
  {"stock":"600900.SH 长江电力(A)","strategy":"系统二 (55,20)","return":-10.0,"sharpe":-0.34,"mdd":-24.6,"win_rate":35.3,"trades":17},
  {"stock":"688981.SH 中芯国际(A)","strategy":"短周期 (10,10)","return":13.5,"sharpe":0.14,"mdd":-45.1,"win_rate":32.1,"trades":28},
  {"stock":"688981.SH 中芯国际(A)","strategy":"系统一 (20,10)","return":9.2,"sharpe":0.10,"mdd":-40.2,"win_rate":28.6,"trades":21},
  {"stock":"688981.SH 中芯国际(A)","strategy":"系统二 (55,20)","return":17.0,"sharpe":0.14,"mdd":-28.4,"win_rate":33.3,"trades":9},
  {"stock":"688099.SH 晶晨股份(A)","strategy":"短周期 (10,10)","return":-24.1,"sharpe":-0.07,"mdd":-58.1,"win_rate":32.4,"trades":34},
  {"stock":"688099.SH 晶晨股份(A)","strategy":"系统一 (20,10)","return":-46.1,"sharpe":-0.32,"mdd":-71.6,"win_rate":28.6,"trades":28},
  {"stock":"688099.SH 晶晨股份(A)","strategy":"系统二 (55,20)","return":-59.3,"sharpe":-0.62,"mdd":-65.7,"win_rate":12.5,"trades":16},
  {"stock":"00981.HK 中芯国际(H)","strategy":"短周期 (10,10)","return":140.4,"sharpe":0.46,"mdd":-54.9,"win_rate":43.6,"trades":39},
  {"stock":"00981.HK 中芯国际(H)","strategy":"系统一 (20,10)","return":57.7,"sharpe":0.28,"mdd":-62.4,"win_rate":36.1,"trades":36},
  {"stock":"00981.HK 中芯国际(H)","strategy":"系统二 (55,20)","return":122.8,"sharpe":0.44,"mdd":-42.1,"win_rate":46.1,"trades":13},
  {"stock":"01211.HK 比亚迪(H)","strategy":"短周期 (10,10)","return":242.8,"sharpe":0.68,"mdd":-21.6,"win_rate":35.7,"trades":42},
  {"stock":"01211.HK 比亚迪(H)","strategy":"系统一 (20,10)","return":169.8,"sharpe":0.56,"mdd":-30.9,"win_rate":32.3,"trades":31},
  {"stock":"01211.HK 比亚迪(H)","strategy":"系统二 (55,20)","return":182.6,"sharpe":0.58,"mdd":-36.4,"win_rate":25.0,"trades":16}
];

const stocks = [...new Set(DATA.map(d => d.stock))];
const strats = [...new Set(DATA.map(d => d.strategy))];
const maxRet = Math.max(...DATA.map(d => Math.abs(d.return)));

function colorFor(val) {
  if (val > 0) {
    const intensity = Math.min(val / maxRet, 1);
    const r = 198, g = Math.round(40 + (1-intensity)*200), b = Math.round(40 + (1-intensity)*200);
    return `rgb(${r},${g},${b})`;
  } else if (val < 0) {
    const intensity = Math.min(Math.abs(val) / maxRet, 1);
    const r = Math.round(40 + (1-intensity)*180), g = Math.round(120 + intensity*80), b = Math.round(40 + intensity*80);
    return `rgb(${r},${g},${b})`;
  }
  return '#fff';
}

function textColor(val) {
  return Math.abs(val) > maxRet * 0.5 ? '#fff' : '#333';
}

// Heatmap
let html = '<div class="col-labels">';
strats.forEach(s => html += `<div>${s}</div>`);
html += '</div><div class="grid">';
html += '<div class="header-row"><div class="spacer"></div>';
strats.forEach(s => html += `<div class="hdr">${s}</div>`);
html += '</div>';

stocks.forEach(stock => {
  html += '<div class="row"><div class="row-label">' + stock.split(' ')[0] + '</div>';
  strats.forEach(strat => {
    const d = DATA.find(r => r.stock === stock && r.strategy === strat);
    if (d) {
      const bg = colorFor(d.return);
      const tc = textColor(d.return);
      html += `<div class="cell" style="background:${bg};color:${tc}" title="${stock}\n${strat}\n夏普:${d.sharpe} | MDD:${d.mdd}% | 胜率:${d.win_rate}%">
        <div class="val">${d.return > 0 ? '+' : ''}${d.return}%</div>
        <div class="det">夏普${d.sharpe} | ${d.trades}次</div>
      </div>`;
    } else {
      html += '<div class="cell" style="background:#f0f0f0"></div>';
    }
  });
  html += '</div>';
});
html += '</div>';
document.getElementById('heatmap').innerHTML = html;

// Detail sections
let detHtml = '';
['累计回报率', '夏普比率', '最大回撤'].forEach(metric => {
  detHtml += `<div class="metric-section"><h3>${metric}</h3>`;
  const key = metric === '累计回报率' ? 'return' : metric === '夏普比率' ? 'sharpe' : 'mdd';
  const sorted = [...DATA].sort((a,b) => b[key] - a[key]);
  const max = Math.max(...sorted.map(d => Math.abs(d[key])));
  sorted.forEach(d => {
    const pct = Math.abs(d[key]) / max * 100;
    const cls = d[key] > 0 ? 'pos' : (d[key] < 0 && key !== 'mdd') ? 'neg' : '';
    detHtml += `<div class="bar">
      <span class="label">${d.stock.split(' ')[0]}</span>
      <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
      <span class="bar-val">${d[key]}${key==='return'?'%':'%'}</span>
    </div>`;
  });
  detHtml += '</div>';
});
document.getElementById('details').innerHTML = detHtml;
</script>
</body>
</html>
