const fmtNum = (v, d=2) => v != null ? Number(v).toFixed(d) : '-';
const fmtDate = (s) => s ? `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}` : '-';

// === Header ===
document.getElementById('header-date').textContent =
  `晶晨股份 (${data.basic.ts_code}) | ${fmtDate(data.daily[0]?.trade_date)} ~ ${fmtDate(data.daily.at(-1)?.trade_date)}`;

// === Metrics ===
const daily = data.daily;
const latest = daily.at(-1) || {};
const first = daily[0] || {};
const latestClose = latest.close;
const firstClose = first.close;
const totalChange = ((latestClose - firstClose) / firstClose * 100);
const color = totalChange >= 0 ? '#e74c3c' : '#27ae60';

document.getElementById('metrics').innerHTML = [
  { label: '最新收盘价', value: fmtNum(latestClose), change: '' },
  { label: '区间涨跌幅', value: fmtNum(totalChange) + '%', change: '', color },
  { label: '最高价', value: fmtNum(Math.max(...daily.map(d=>d.high))), change: '（一年内）' },
  { label: '最低价', value: fmtNum(Math.min(...daily.map(d=>d.low))), change: '（一年内）' },
  { label: '日均成交量', value: (daily.reduce((s,d)=>s+(d.vol||0),0)/daily.length/1e4).toFixed(0)+'万手' },
].map(m => `
  <div class="metric-card">
    <div class="label">${m.label}</div>
    <div class="value" style="color:${m.color||'#333'}">${m.value}</div>
    <div class="change">${m.change||''}</div>
  </div>
`).join('');

// === K-line Chart ===
const dates = daily.map(d => d.trade_date);
const ohlc = daily.map(d => [d.open, d.close, d.low, d.high]);
const vols = daily.map(d => d.vol);

const klineOpt = {
  tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
  legend: { data: ['K线', 'MA5', 'MA10', 'MA20'], top: 8 },
  grid: [{ left: '8%', right: '1%', top: 60, height: '65%' }, { left: '8%', right: '1%', top: '82%', height: '16%' }],
  xAxis: [{ type: 'category', data: dates, gridIndex: 0, axisLabel: { rotate: 45 } },
           { type: 'category', data: dates, gridIndex: 1, axisLabel: { show: false } }],
  yAxis: [{ type: 'value', gridIndex: 0, scale: true, splitArea: { show: true } },
          { type: 'value', gridIndex: 1 }],
  series: [
    { name: 'K线', type: 'candlestick', data: ohlc, xAxisIndex: 0, yAxisIndex: 0,
      itemStyle: { color: '#e74c3c', color0: '#27ae60', borderColor: '#e74c3c', borderColor0: '#27ae60' } },
    { name: 'MA5', type: 'line', data: ma(5), xAxisIndex: 0, yAxisIndex: 0,
      smooth: true, lineStyle: { width: 1, color: '#ffa500' }, symbol: 'none' },
    { name: 'MA10', type: 'line', data: ma(10), xAxisIndex: 0, yAxisIndex: 0,
      smooth: true, lineStyle: { width: 1, color: '#3498db' }, symbol: 'none' },
    { name: 'MA20', type: 'line', data: ma(20), xAxisIndex: 0, yAxisIndex: 0,
      smooth: true, lineStyle: { width: 1, color: '#9b59b6' }, symbol: 'none' },
    { name: '成交量', type: 'bar', data: vols, xAxisIndex: 1, yAxisIndex: 1,
      itemStyle: { color: function(p) {
        return daily[p.dataIndex].close >= daily[p.dataIndex].open ? '#e74c3c' : '#27ae60';
      } } }
  ]
};
echarts.init(document.getElementById('kline-chart')).setOption(klineOpt);

function ma(n) {
  return daily.map((d, i) => {
    if (i < n - 1) return null;
    let sum = 0; for (let j = i - n + 1; j <= i; j++) sum += daily[j].close;
    return +(sum / n).toFixed(2);
  });
}

// === Volume + Turnover Chart ===
const indicators = data.indicators || [];
const turnMap = {};
indicators.forEach(d => { turnMap[d.trade_date] = d.turnover_rate; });

const volOpt = {
  tooltip: { trigger: 'axis' },
  legend: { data: ['成交量', '换手率'], top: 8 },
  grid: [{ left: '8%', right: '4%', top: 60, height: '55%' }, { left: '8%', right: '4%', top: '75%', height: '22%' }],
  xAxis: [{ type: 'category', data: dates, gridIndex: 0, axisLabel: { rotate: 45 } },
           { type: 'category', data: dates, gridIndex: 1, axisLabel: { show: false } }],
  yAxis: [{ type: 'value', name: '成交量', gridIndex: 0 },
          { type: 'value', name: '换手率(%)', gridIndex: 1 }],
  series: [
    { name: '成交量', type: 'bar', data: vols, xAxisIndex: 0, yAxisIndex: 0,
      itemStyle: { color: '#0f3460', opacity: 0.7 } },
    { name: '换手率', type: 'line', data: dates.map(d => turnMap[d] || null),
      xAxisIndex: 1, yAxisIndex: 1, smooth: true, lineStyle: { color: '#e67e22' }, symbol: 'none' }
  ]
};
echarts.init(document.getElementById('volume-chart')).setOption(volOpt);

// === Stats ===
const hDate = daily.reduce((a,b) => a.high > b.high ? a : b);
const lDate = daily.reduce((a,b) => a.low < b.low ? a : b);
const maxVol = daily.reduce((a,b) => (a.vol||0) > (b.vol||0) ? a : b);
const sumVol = daily.reduce((s,d) => s + (d.vol||0), 0);
const avgVol = sumVol / daily.length;
const upDays = daily.filter(d => d.close > d.open).length;

document.getElementById('stats-list').innerHTML = [
  ['交易天数', daily.length+'天'],
  ['最高价日期', fmtDate(hDate.trade_date)+' ('+fmtNum(hDate.high)+'元)'],
  ['最低价日期', fmtDate(lDate.trade_date)+' ('+fmtNum(lDate.low)+'元)'],
  ['年化波动率', fmtNum(std(daily.map(d=>d.close)))+'%'],
  ['上涨天数', upDays+'天 ('+fmtNum(upDays/daily.length*100)+'%)'],
  ['最大单日成交量', fmtDate(maxVol.trade_date)+' ('+(maxVol.vol/1e4).toFixed(0)+'万手)'],
].map(r => `<li><span class="item-label">${r[0]}</span><span class="item-value">${r[1]}</span></li>`).join('');

function std(arr) {
  const avg = arr.reduce((s,v)=>s+v,0)/arr.length;
  const variance = arr.reduce((s,v)=>s+(v-avg)*(v-avg),0)/arr.length;
  return Math.sqrt(variance) / avg * 100;
}

// === Performance ===
const now = new Date();
const periods = [
  ['近1周', subDays(now, 7)], ['近1月', subDays(now, 30)],
  ['近3月', subDays(now, 90)], ['近6月', subDays(now, 180)],
  ['近1年', subDays(now, 365)], ['最高回撤', null]
];
function subDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() - n);
  return r.toISOString().slice(0,10).replace(/-/g,'');
}

const perfItems = periods.map(([name, startDate]) => {
  if (name === '最高回撤') {
    let peak = daily[0].close, maxDD = 0;
    daily.forEach(d => { peak = Math.max(peak, d.close); maxDD = Math.max(maxDD, (peak-d.close)/peak*100); });
    return [name, fmtNum(maxDD)+'%'];
  }
  const startRec = daily.find(d => d.trade_date >= startDate) || daily[0];
  const chg = ((latestClose - startRec.close) / startRec.close * 100);
  return [name, fmtNum(chg)+'%'];
});
document.getElementById('perf-list').innerHTML = perfItems.map(r =>
  `<li><span class="item-label">${r[0]}</span><span class="item-value">${r[1]}</span></li>`).join('');

// === Monthly Returns ===
const monthlyMap = {};
daily.forEach(d => {
  const m = d.trade_date.slice(0,6);
  if (!monthlyMap[m]) monthlyMap[m] = { open: d.open, close: d.close, high: d.high, low: d.low };
  monthlyMap[m].close = d.close;
  monthlyMap[m].high = Math.max(monthlyMap[m].high, d.high);
  monthlyMap[m].low = Math.min(monthlyMap[m].low, d.low);
});
const months = Object.keys(monthlyMap).sort();
const monthlyRet = months.map(m => {
  const v = monthlyMap[m];
  return ((v.close - v.open) / v.open * 100).toFixed(2);
});
const monthLabels = months.map(m => m.slice(0,4)+'-'+m.slice(4));

echarts.init(document.getElementById('monthly-chart')).setOption({
  tooltip: { formatter: p => `${p.name}<br/>涨跌幅：${p.value}%` },
  grid: { left: '8%', right: '4%', top: 20, bottom: 40 },
  xAxis: { type: 'category', data: monthLabels, axisLabel: { rotate: 45 } },
  yAxis: { type: 'value', name: '涨跌幅(%)', axisLabel: { formatter: '{value}%' } },
  series: [{
    type: 'bar', data: monthlyRet.map(v => +v),
    label: { show: true, position: 'top', formatter: '{c}%', fontSize: 11 },
    itemStyle: { color: function(p) { return p.value >= 0 ? '#e74c3c' : '#27ae60'; } }
  }]
});

// === Conclusion ===
const upMonths = monthlyRet.filter(v => +v > 0).length;
const trend = totalChange > 0 ? '上涨' : '下跌';
document.getElementById('conclusion-text').textContent =
  `晶晨股份 (688099.SH) 在过去一年中整体呈${trend}趋势，累计涨跌幅为 ${fmtNum(totalChange)}%。` +
  `区间最高价 ${fmtNum(hDate.high)}元（${fmtDate(hDate.trade_date)}），最低价 ${fmtNum(lDate.low)}元（${fmtDate(lDate.trade_date)}），` +
  `年化波动率约 ${fmtNum(std(daily.map(d=>d.close)))}%。` +
  `${months.length}个交易月中，${upMonths}个月上涨、${months.length-upMonths}个月下跌。` +
  `上涨交易天数占比 ${fmtNum(upDays/daily.length*100)}%。` +
  `${totalChange > 0 ? '该股在最近一年表现偏强，投资者可关注后续走势。' : '该股在最近一年承压回落，投资者可关注基本面变化及行业动态。'}`;

// === Footer ===
document.getElementById('gen-time').textContent = new Date().toLocaleString('zh-CN');

// === Responsive ===
window.addEventListener('resize', () => {
  echarts.getInstanceByDom(document.getElementById('kline-chart'))?.resize();
  echarts.getInstanceByDom(document.getElementById('volume-chart'))?.resize();
  echarts.getInstanceByDom(document.getElementById('monthly-chart'))?.resize();
});
