<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicator Lab — 中芯国际 比亚迪 长江电力</title>
<script src="lib/chart.umd.min.js"></script>
<style>
:root{--bg:#f5f5f5;--card:#fff;--text:#1a1a2e;--muted:#888;--border:#e0e0e0;--red:#e3453b;--green:#1cad6a;--blue:#4d6bfe}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:16px 20px}
.layout{display:grid;grid-template-columns:280px 1fr;gap:16px;max-width:1440px;margin:0 auto}
.sidebar{display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border)}
.card h3{font-size:12px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
select,input[type=date]{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg)}
.param-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.param-row label{font-size:12px;color:var(--muted);min-width:52px}
.param-row input[type=range]{flex:1;margin:0 8px;accent-color:var(--blue)}
.param-row .val{font-size:12px;font-weight:600;min-width:30px;text-align:right;background:var(--bg);padding:2px 5px;border-radius:4px}
.date-wrap{display:flex;gap:6px;align-items:center;font-size:12px;margin-top:6px}
.date-wrap input{font-size:11px;padding:4px 6px}
.slider-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.main{display:flex;flex-direction:column;gap:12px}
.main-chart{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border)}
.main-chart .title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.main-chart h3{font-size:14px;font-weight:600}
.main-chart .meta{font-size:11px;color:var(--muted)}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.panel{background:var(--card);border-radius:12px;padding:12px;border:1px solid var(--border)}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.panel-header .name{font-size:13px;font-weight:600}
.panel-header .signal{font-size:11px;padding:1px 8px;border-radius:10px;background:var(--bg)}
.status{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.stat{background:var(--card);border-radius:12px;padding:10px;border:1px solid var(--border);text-align:center}
.stat .label{font-size:10px;color:var(--muted)}
.stat .val{font-size:15px;font-weight:600;margin-top:2px}
.chart-box{position:relative}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="card"><h3>股票选择</h3>
    <select id="stockSelect">
      <optgroup label="A 股 (CNY)">
        <option value="688981.SH">688981.SH 中芯国际</option>
        <option value="002594.SZ">002594.SZ 比亚迪</option>
        <option value="600900.SH">600900.SH 长江电力</option>
      </optgroup>
      <optgroup label="H 股 (HKD)">
        <option value="00981.HK" selected>00981.HK 中芯国际</option>
        <option value="01211.HK">01211.HK 比亚迪</option>
      </optgroup>
    </select>
  </div>
  <div class="card"><h3>日期范围</h3>
    <div class="slider-row"><span id="rangeStartLabel"></span><span id="rangeEndLabel"></span></div>
    <input type="range" id="rangeSlider" min="0" max="100" value="80" style="width:100%">
    <div class="date-wrap"><input type="date" id="dateFrom"><span>—</span><input type="date" id="dateTo"></div>
  </div>
  <div class="card"><h3>RSI 参数</h3>
    <div class="param-row"><label>周期</label><input type="range" id="rsiP" min="2" max="50" value="14"><span class="val" id="rsiPv">14</span></div>
    <div class="param-row"><label>超买线</label><input type="range" id="rsiOB" min="50" max="90" value="70"><span class="val" id="rsiOBv">70</span></div>
    <div class="param-row"><label>超卖线</label><input type="range" id="rsiOS" min="10" max="50" value="30"><span class="val" id="rsiOSv">30</span></div>
  </div>
  <div class="card"><h3>MACD 参数</h3>
    <div class="param-row"><label>快线</label><input type="range" id="mF" min="2" max="50" value="12"><span class="val" id="mFv">12</span></div>
    <div class="param-row"><label>慢线</label><input type="range" id="mS" min="5" max="100" value="26"><span class="val" id="mSv">26</span></div>
    <div class="param-row"><label>信号线</label><input type="range" id="mSig" min="2" max="30" value="9"><span class="val" id="mSigv">9</span></div>
  </div>
  <div class="card"><h3>布林带参数</h3>
    <div class="param-row"><label>周期</label><input type="range" id="bbP" min="2" max="100" value="20"><span class="val" id="bbPv">20</span></div>
    <div class="param-row"><label>标准差</label><input type="range" id="bbM" min="5" max="40" value="20"><span class="val" id="bbMv">2.0</span></div>
  </div>
  <div class="card"><h3>ATR 参数</h3>
    <div class="param-row"><label>周期</label><input type="range" id="atrP" min="2" max="50" value="14"><span class="val" id="atrPv">14</span></div>
  </div>
</aside>

<main class="main">
  <div class="main-chart">
    <div class="title-row"><h3 id="chartTitle">K 线图 + 布林带</h3><span class="meta" id="chartMeta"></span></div>
    <div class="chart-box" style="height:340px"><canvas id="mainChart"></canvas></div>
  </div>
  <div class="panels">
    <div class="panel"><div class="panel-header"><span class="name">RSI</span><span class="signal" id="rsiSignal">--</span></div>
      <div class="chart-box" style="height:140px"><canvas id="rsiChart"></canvas></div></div>
    <div class="panel"><div class="panel-header"><span class="name">MACD</span><span class="signal" id="macdSignal">--</span></div>
      <div class="chart-box" style="height:140px"><canvas id="macdChart"></canvas></div></div>
    <div class="panel"><div class="panel-header"><span class="name">布林带</span><span class="signal" id="bbSignal">--</span></div>
      <div class="chart-box" style="height:140px"><canvas id="bbChart"></canvas></div></div>
    <div class="panel"><div class="panel-header"><span class="name">ATR</span><span class="signal" id="atrSignal">--</span></div>
      <div class="chart-box" style="height:140px"><canvas id="atrChart"></canvas></div></div>
  </div>
  <div class="status">
    <div class="stat"><div class="label">最新价</div><div class="val" id="statClose">--</div></div>
    <div class="stat"><div class="label">涨跌幅</div><div class="val" id="statChange">--</div></div>
    <div class="stat"><div class="label">RSI</div><div class="val" id="statRSI">--</div></div>
    <div class="stat"><div class="label">布林位置</div><div class="val" id="statBB">--</div></div>
    <div class="stat"><div class="label">ATR</div><div class="val" id="statATR">--</div></div>
  </div>
</main>
</div>

<script src="data_csv.js"></script>
<script>
// ═══ CSV Parser ═══
function parseCsv(s){
  return s.trim().split(/\r?\n/).map(l=>{
    const c=l.split(',');
    if(c.length<6) return null;
    return {d:c[0], o:+c[1], h:+c[2], l:+c[3], c:+c[4], v:+c[5]};
  }).filter(Boolean);
}

// ═══ Indicators ═══
const RED='#e3453b', GREEN='#1cad6a';
function ema(a,n){const k=2/(n+1),r=[];for(let i=0;i<a.length;i++)r.push(i===0?a[i]:r[i-1]+k*(a[i]-r[i-1]));return r}
const I={
  rsi(d,p){const r=[];let g=0,l=0;for(let i=0;i<d.length;i++){const dt=i?d[i].c-d[i-1].c:0,gn=dt>0?dt:0,ls=dt<0?-dt:0;if(i<p){g+=gn;l+=ls;r.push(null)}else{if(i===p){g/=p;l/=p}else{g=(g*(p-1)+gn)/p;l=(l*(p-1)+ls)/p}r.push(l===0?100:100-100/(1+g/l))}}return r},
  macd(d,f,s,sg){const c=d.map(r=>r.c),mf=ema(c,f),ms=ema(c,s),m=mf.map((v,i)=>v-ms[i]),se=ema(m,sg);return{macd:m,signal:se,hist:m.map((v,i)=>v-se[i])}},
  bb(d,p,mu){const u=[],md=[],lw=[];for(let i=0;i<d.length;i++){if(i<p-1){u.push(null);md.push(null);lw.push(null);continue}const s=d.slice(i-p+1,i+1),mn=s.reduce((a,v)=>a+v.c,0)/p,va=s.reduce((a,v)=>a+(v.c-mn)**2,0)/p,sd=Math.sqrt(va);md.push(mn);u.push(mn+mu*sd);lw.push(mn-mu*sd)}return{upper:u,middle:md,lower:lw}},
  atr(d,p){const tr=[],a=[];for(let i=0;i<d.length;i++){const h=d[i].h,l=d[i].l,c=i?d[i-1].c:d[i].c;tr.push(Math.max(h-l,Math.abs(h-c),Math.abs(l-c)))}for(let i=0;i<d.length;i++){if(i<p){a.push(null);continue}if(i===p)a.push(tr.slice(0,p).reduce((x,v)=>x+v)/p);else a.push((a[i-1]*(p-1)+tr[i])/p)}return a}
};

// ═══ Candlestick Plugin (reads from chart.$cdls) ═══
const candlePlugin = {
  id: 'candle',
  beforeDatasetsDraw(chart) {
    const cdls = chart.$cdls;
    if (!cdls) return;
    const meta = chart.getDatasetMeta(0);
    if (!meta || !meta.data || meta.data.length === 0) return;
    const ctx = chart.ctx, ys = chart.scales.y;
    if (!ys) return;
    
    for (let i = 0; i < meta.data.length && i < cdls.length; i++) {
      const bar = meta.data[i], k = cdls[i];
      if (!bar || !k) continue;
      const color = k.up ? RED : GREEN;
      const x = bar.x, w = Math.max(1, bar.width * 0.7);
      const yH = ys.getPixelForValue(k.h), yL = ys.getPixelForValue(k.l);
      const yT = ys.getPixelForValue(k.bt), yB = ys.getPixelForValue(k.bb);
      
      // Wicks
      ctx.strokeStyle = color; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, yH); ctx.lineTo(x, yT); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, yB); ctx.lineTo(x, yL); ctx.stroke();
      
      // Body
      const bh = yB - yT;
      ctx.fillStyle = color;
      if (Math.abs(bh) < 1.5) {
        ctx.fillRect(x - w/2, yT - 1, w, 2);
      } else {
        ctx.fillRect(x - w/2, Math.min(yT, yB), w, Math.abs(bh));
        if (!k.up && Math.abs(bh) > 2) {
          ctx.fillStyle = '#fff';
          const pad = Math.max(1, w * 0.2);
          ctx.fillRect(x - w/2 + pad, Math.min(yT, yB) + pad, w - pad*2, Math.abs(bh) - pad*2);
        }
      }
    }
    
    // Hide dummy bars
    ctx.globalCompositeOperation = 'destination-out';
    for (let i = 0; i < meta.data.length; i++) {
      const bar = meta.data[i];
      if (bar) ctx.fillRect(bar.x - bar.width/2, bar.y, bar.width, bar.height);
    }
    ctx.globalCompositeOperation = 'source-over';
  }
};

// ═══ State ═══
const S = { data:[], name:'', code:'', cur:'', charts:{}, range:[0,0] };
const O = () => ({responsive:true, maintainAspectRatio:false, animation:false,
  interaction:{intersect:false,mode:'index'},
  plugins:{legend:{display:false},
    tooltip:{backgroundColor:'rgba(0,0,0,0.8)',titleFont:{size:11},bodyFont:{size:10}}
  },
  scales:{x:{ticks:{maxTicksLimit:8,font:{size:9}},grid:{color:'#eee'}},
    y:{ticks:{font:{size:9}},grid:{color:'#eee'}}}});

function pv(id){ return +document.getElementById(id).value; }

function sliceRange(){
  const s = pv('rangeSlider')/100, L = S.data.length;
  const start = Math.floor(s * (L - 1));
  S.range = [start, L - 1];
  document.getElementById('dateFrom').value = S.data[start].d;
  document.getElementById('dateTo').value = S.data[L-1].d;
}
function sliced(){ return S.data.slice(S.range[0], S.range[1]+1); }

// ═══ Redraw ═══
function redraw(){
  const d = sliced();
  if (!d || d.length === 0) return;
  const dates = d.map(r => r.d);
  const last = d[d.length-1];
  const step = Math.max(1, Math.floor(d.length / 10));
  const labels = dates.map((dt, i) => i % step === 0 ? dt : '');
  
  const pp = {
    rsiP: pv('rsiP'), rsiOB: pv('rsiOB'), rsiOS: pv('rsiOS'),
    mF: pv('mF'), mS: pv('mS'), mSig: pv('mSig'),
    bbP: pv('bbP'), bbM: pv('bbM')/10, atrP: pv('atrP')
  };
  
  // Candle data
  const cdls = d.map(r => ({
    up: r.c >= r.o,
    bt: Math.max(r.o, r.c),
    bb: Math.min(r.o, r.c),
    h: r.h, l: r.l
  }));
  
  // BB
  const bb = I.bb(d, pp.bbP, pp.bbM);
  
  // ── MAIN: K-line + BB ──
  if (S.charts.main) S.charts.main.destroy();
  const mc = new Chart(document.getElementById('mainChart').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [
      { data: d.map(() => 0), barPercentage: 1, categoryPercentage: 0.85 },
      { label:'BB上', type:'line', data: bb.upper, borderColor:'rgba(77,107,254,0.6)', borderWidth:1, pointRadius:0, borderDash:[4,3] },
      { label:'BB中', type:'line', data: bb.middle, borderColor:'rgba(77,107,254,0.3)', borderWidth:1, pointRadius:0 },
      { label:'BB下', type:'line', data: bb.lower, borderColor:'rgba(77,107,254,0.6)', borderWidth:1, pointRadius:0, borderDash:[4,3] }
    ]},
    options: { ...O(),
      plugins: { ...O().plugins,
        tooltip: { ...O().plugins.tooltip,
          callbacks: {
            title: items => d[items[0]?.dataIndex]?.d || '',
            label: item => {
              if (item.datasetIndex > 0) return (item.parsed.y ?? 0).toFixed(2);
              const r = d[item.dataIndex];
              return r ? `O:${r.o.toFixed(2)} H:${r.h.toFixed(2)} L:${r.l.toFixed(2)} C:${r.c.toFixed(2)}` : '';
            }
          }
        }
      }
    },
    plugins: [candlePlugin]
  });
  // Set candle data BEFORE update triggers re-render
  mc.$cdls = cdls;
  mc.update('none');
  S.charts.main = mc;
  
  // ── RSI ──
  const rsi = I.rsi(d, pp.rsiP);
  if (S.charts.rsi) S.charts.rsi.destroy();
  S.charts.rsi = new Chart(document.getElementById('rsiChart').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [
      { data: rsi, borderColor:'#7b5ea7', borderWidth:2, pointRadius:0, fill:false }
    ]},
    options: { ...O(), scales: { ...O().scales, y: { min:0, max:100, ticks:{stepSize:20,font:{size:9}}, grid:{color:'#eee'} } } },
    plugins: [{
      id: 'rsiLines',
      afterDraw(chart) {
        const y = chart.scales.y, x = chart.scales.x;
        if (!y || !x) return;
        [{v:pp.rsiOB,c:'rgba(227,69,59,0.4)'},{v:pp.rsiOS,c:'rgba(28,173,106,0.4)'}].forEach(q => {
          const py = y.getPixelForValue(q.v);
          chart.ctx.save();
          chart.ctx.strokeStyle = q.c;
          chart.ctx.setLineDash([4,4]);
          chart.ctx.beginPath();
          chart.ctx.moveTo(x.left, py);
          chart.ctx.lineTo(x.right, py);
          chart.ctx.stroke();
          chart.ctx.restore();
        });
      }
    }]
  });
  
  // ── MACD ──
  const macd = I.macd(d, pp.mF, pp.mS, pp.mSig);
  drawPanel('macdChart', 'macd', labels, [
    { type:'bar', data: macd.hist, backgroundColor: macd.hist.map(v => v >= 0 ? 'rgba(227,69,59,0.7)' : 'rgba(28,173,106,0.7)'), barPercentage: 0.8 },
    { type:'line', data: macd.macd, borderColor: RED, borderWidth:1.5, pointRadius:0 },
    { type:'line', data: macd.signal, borderColor:'#4da6ff', borderWidth:1.5, pointRadius:0 }
  ]);
  
  // ── BB panel ──
  drawPanel('bbChart', 'bb', labels, [
    { data: bb.upper, borderColor:'rgba(77,107,254,0.7)', borderWidth:1, pointRadius:0, borderDash:[3,2] },
    { data: bb.lower, borderColor:'rgba(77,107,254,0.7)', borderWidth:1, pointRadius:0, borderDash:[3,2] },
    { data: bb.middle, borderColor:'rgba(77,107,254,0.3)', borderWidth:1, pointRadius:0 },
    { data: d.map(r => r.c), borderColor:'#222', borderWidth:1.5, pointRadius:0 }
  ]);
  
  // ── ATR ──
  const atr = I.atr(d, pp.atrP);
  drawPanel('atrChart', 'atr', labels, [
    { data: atr, borderColor:'#f0a040', borderWidth:1.5, pointRadius:0, fill:{target:'origin',above:'rgba(240,160,64,0.15)'} }
  ]);
  
  // ── Status ──
  const chg = d.length > 1 ? (last.c / d[d.length-2].c - 1) * 100 : 0;
  document.getElementById('statClose').textContent = (S.cur === 'CNY' ? '¥' : 'HK$') + last.c.toFixed(2);
  document.getElementById('statChange').innerHTML = `<span style="color:${chg>=0?RED:GREEN}">${chg>=0?'+':''}${chg.toFixed(2)}%</span>`;
  const lr = rsi[rsi.length-1];
  document.getElementById('statRSI').textContent = lr != null ? lr.toFixed(1) : '--';
  const bPct = bb.upper.map((u, i) => u == null ? null : (d[i].c - bb.lower[i]) / (u - bb.lower[i]) * 100);
  const lb = bPct[bPct.length-1];
  document.getElementById('statBB').textContent = lb != null ? lb.toFixed(1) + '%' : '--';
  const la = atr[atr.length-1];
  document.getElementById('statATR').textContent = la != null ? (la / last.c * 100).toFixed(1) + '%' : '--';
  
  // ── Signals ──
  const sig = lr > pp.rsiOB ? '超买' : lr < pp.rsiOS ? '超卖' : '中性';
  document.getElementById('rsiSignal').textContent = lr ? lr.toFixed(1) + ' ' + sig : '--';
  document.getElementById('rsiSignal').style.background = sig === '超买' ? 'rgba(227,69,59,0.1)' : sig === '超卖' ? 'rgba(28,173,106,0.1)' : '#f0f0f0';
  const lm = macd.hist[macd.hist.length-1];
  document.getElementById('macdSignal').textContent = lm >= 0 ? '金叉' : '死叉';
  document.getElementById('macdSignal').style.background = lm >= 0 ? 'rgba(227,69,59,0.1)' : 'rgba(28,173,106,0.1)';
  document.getElementById('bbSignal').textContent = lb ? lb.toFixed(1) + '%' + (lb > 100 ? ' B/O' : lb < 0 ? ' B/D' : '') : '--';
  document.getElementById('atrSignal').textContent = la ? la.toFixed(2) : '--';
  
  // ── Meta ──
  document.getElementById('chartTitle').textContent = S.name;
  document.getElementById('chartMeta').textContent = `${d[0].d} ~ ${last.d} · ${S.cur} · 前复权`;
  document.getElementById('rangeStartLabel').textContent = d[0].d;
  document.getElementById('rangeEndLabel').textContent = last.d;
}

function drawPanel(canvasId, key, labels, datasets) {
  if (S.charts[key]) S.charts[key].destroy();
  S.charts[key] = new Chart(document.getElementById(canvasId).getContext('2d'), {
    type: 'line',
    data: { labels, datasets },
    options: O()
  });
}

// ═══ Load ═══
function load(code) {
  if (!CSV_DATA[code]) return;
  S.data = parseCsv(CSV_DATA[code]);
  S.code = code;
  const opt = document.getElementById('stockSelect').selectedOptions[0];
  S.name = opt.text.split(' ').slice(1).join(' ');
  S.cur = code.endsWith('.HK') ? 'HKD' : 'CNY';
  // Default to last ~20% of data (recent period)
  document.getElementById('rangeSlider').value = 80;
  document.getElementById('dateFrom').value = S.data[0].d;
  document.getElementById('dateTo').value = S.data[S.data.length-1].d;
  sliceRange();
  redraw();
}

// ═══ Events ═══
document.getElementById('stockSelect').addEventListener('change', e => load(e.target.value));
document.getElementById('rangeSlider').addEventListener('input', () => { sliceRange(); redraw(); });
document.getElementById('dateFrom').addEventListener('change', function() {
  const i = S.data.findIndex(r => r.d >= this.value);
  if (i >= 0) {
    document.getElementById('rangeSlider').value = Math.round(i / (S.data.length - 1) * 100);
    sliceRange(); redraw();
  }
});
document.getElementById('dateTo').addEventListener('change', () => redraw());

['rsiP','rsiOB','rsiOS','mF','mS','mSig','bbP','bbM','atrP'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    document.getElementById(id + 'v').textContent = id === 'bbM' ? (parseInt(this.value) / 10).toFixed(1) : this.value;
    redraw();
  });
});

// Init
if (typeof CSV_DATA !== 'undefined') {
  load('00981.HK');
} else {
  document.body.innerHTML = '<div style="color:red;padding:40px;font-size:18px">错误：data_csv.js 未加载！请确认文件存在。</div>';
}
</script>
</body>
</html>
